{% extends 'music/base.html' %}
{% block content %}
    <h2>Confirmar exclusão</h2>
    <p>Deseja excluir <strong>{{ musica.titulo }}</strong>?</p>
    <form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-red">Sim, excluir</button>
    <a href="javascript:history.back()" class="btn btn-blue">Cancelar</a>
</form>
{% endblock %}
