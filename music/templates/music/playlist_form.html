{% extends 'music/base.html' %}

{% load static %}

{% block extra_css %}

{% endblock %}

{% block content %}
<h2>{{ titulo }}</h2>
<form method="post">
    {% csrf_token %}

    <a href="{% url 'playlist_listar' %}">Cancelar</a>
</form>
{% endblock %}
